# CI for StrictTemplate.jl
#
# Runs the test suite across a matrix of Julia versions and operating systems,
# then builds and deploys documentation. Triggers on pushes to main, any tag,
# pull requests, and manual dispatch.
#
# The matrix tests structure preservation: if your package works on 1.10 and
# survives nightly, the morphism from source to binary is stable. fail-fast
# is off so a nightly regression doesn't mask an LTS result.

name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  statuses: write

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # nightly failures shouldn't block LTS results
      matrix:
        version:
          - '1.10'   # compat floor — the version you promise to support
          - 'nightly' # catches upstream breakage before it surprises you
        os:
          - ubuntu-latest
        include:
          - version: '1.10'
            os: macos-latest  # cross-platform validation for the stable version
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs docs/make.jl
